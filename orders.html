<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesanan Saya | Gaskeun Food</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = {
          theme: { extend: { colors: { primary: '#FFD400', accent: '#E53935', support: '#0F6B3C' } } }
        }
    </script>
</head>
<body class="bg-gray-50 pb-20">

    <header class="p-4 bg-white shadow-sm sticky top-0 z-50">
        <h1 class="font-bold text-lg text-center">Riwayat Pesanan</h1>
    </header>

    <main class="max-w-md mx-auto p-4" id="orders-container">
        <div class="animate-pulse space-y-4">
            <div class="bg-white h-40 rounded-3xl"></div>
            <div class="bg-white h-40 rounded-3xl"></div>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around p-3 text-gray-400">
        <a href="index.html" class="text-center"><i class="fas fa-home block"></i><span class="text-[10px]">Home</span></a>
        <a href="orders.html" class="text-primary text-center"><i class="fas fa-receipt block"></i><span class="text-[10px]">Pesanan</span></a>
        <a href="profile.html" class="text-center"><i class="fas fa-user block"></i><span class="text-[10px]">Profil</span></a>
    </div>

    <script src="js/api.js"></script>
    <script>
        const statusMap = {
            'pending': { label: 'Menunggu', step: 1, color: 'gray' },
            'accepted': { label: 'Diterima', step: 2, color: 'blue' },
            'cooking': { label: 'Dimasak', step: 3, color: 'yellow' },
            'picked_up': { label: 'Diantar', step: 4, color: 'orange' },
            'delivered': { label: 'Selesai', step: 5, color: 'green' }
        };

        async function loadOrders() {
            try {
                // Kita asumsikan user ID 'CUST-GUEST' untuk demo ini
                const response = await fetch(`${API_URL}?action=getOrders&uid=CUST-GUEST`);
                const orders = await response.json();
                renderOrders(orders);
            } catch (err) {
                console.error("Gagal memuat pesanan", err);
            }
        }

        function renderOrders(orders) {
            const container = document.getElementById('orders-container');
            if (orders.length === 0) {
                container.innerHTML = `<div class="text-center mt-20 text-gray-400">Belum ada pesanan nih...</div>`;
                return;
            }

            container.innerHTML = orders.reverse().map(order => {
                const currentStatus = statusMap[order.status] || statusMap['pending'];
                const progressWidth = (currentStatus.step / 5) * 100;

                return `
                <div class="bg-white p-5 rounded-3xl shadow-sm mb-4 border border-gray-100">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <p class="text-[10px] text-gray-400 font-mono">${order.order_id}</p>
                            <h4 class="font-bold">Total: Rp ${parseInt(order.total_price).toLocaleString()}</h4>
                        </div>
                        <span class="text-[10px] font-bold uppercase px-2 py-1 rounded-full bg-${currentStatus.color}-100 text-${currentStatus.color}-700">
                            ${currentStatus.label}
                        </span>
                    </div>

                    <div class="relative pt-1">
                        <div class="overflow-hidden h-2 mb-4 text-xs flex rounded bg-gray-100">
                            <div style="width:${progressWidth}%" class="shadow-none flex flex-col text-center whitespace-nowrap text-white justify-center bg-primary transition-all duration-500"></div>
                        </div>
                        <div class="flex justify-between text-[8px] text-gray-400 uppercase font-bold">
                            <span>Pesan</span>
                            <span>Masak</span>
                            <span>Antar</span>
                            <span>Sampai</span>
                        </div>
                    </div>

                    <div class="mt-4 pt-4 border-t border-dashed flex justify-between items-center">
                        <p class="text-xs text-gray-500"><i class="fas fa-clock mr-1"></i> ${new Date(order.timestamp).toLocaleTimeString()}</p>
                        <button class="text-primary text-xs font-bold">Detail Menu <i class="fas fa-chevron-right ml-1"></i></button>
                    </div>
                </div>
                `;
            }).join('');
        }

        // Jalankan polling setiap 10 detik agar status update otomatis
        loadOrders();
        setInterval(loadOrders, 10000);
    </script>
</body>
</html>
