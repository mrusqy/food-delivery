<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Panel | Gaskeun Delivery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#FFD400', support: '#0F6B3C', accent: '#E53935' } } }
        }
    </script>
</head>
<body class="bg-gray-100">

    <nav class="bg-black text-white p-4 sticky top-0 z-50">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <h1 class="font-bold text-primary italic">DRIVER MODE</h1>
            <span class="text-xs bg-support px-2 py-1 rounded">Online</span>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-4">
        <h2 class="font-bold text-xl mb-4 text-dark">Pesanan Tersedia</h2>
        
        <div id="available-orders" class="space-y-4">
            <div class="animate-pulse bg-white p-6 rounded-3xl h-32 shadow-sm"></div>
        </div>
    </main>

    <script src="../js/api.js"></script>
    <script>
        async function loadAvailableOrders() {
            // Kita filter orderan yang statusnya sudah 'accepted' oleh admin tapi belum ada driver
            const res = await fetch(`${API_URL}?action=getOrders`); // Sesuaikan di backend untuk filter
            const orders = await res.json();
            const container = document.getElementById('available-orders');

            const filtered = orders.filter(o => o.status === 'accepted');

            if(filtered.length === 0) {
                container.innerHTML = `<p class="text-center text-gray-500 mt-10">Belum ada pesanan masuk...</p>`;
                return;
            }

            container.innerHTML = filtered.map(order => `
                <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100">
                    <div class="flex justify-between items-start mb-3">
                        <div>
                            <p class="text-xs text-gray-400">ID: ${order.order_id}</p>
                            <p class="font-bold text-lg">Rp ${parseInt(order.total_price).toLocaleString()}</p>
                        </div>
                        <span class="bg-yellow-100 text-yellow-700 text-[10px] px-2 py-1 rounded-full font-bold uppercase">Siap Antar</span>
                    </div>
                    <p class="text-sm text-gray-600 mb-4"><i class="fas fa-map-marker-alt text-accent mr-1"></i> ${order.delivery_address}</p>
                    <button onclick="pickUpOrder('${order.order_id}')" class="w-full bg-black text-primary font-bold py-3 rounded-2xl active:scale-95 transition">
                        Ambil Pesanan
                    </button>
                </div>
            `).join('');
        }

        async function pickUpOrder(id) {
            if(confirm('Ambil orderan ini?')) {
                // Kirim request ke API untuk update status jadi 'picked_up'
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'updateOrderStatus',
                        order_id: id,
                        status: 'picked_up',
                        driver_id: 'D-001' // Contoh ID driver hardcoded
                    })
                });
                alert('Pesanan diambil! Segera meluncur!');
                loadAvailableOrders();
            }
        }

        loadAvailableOrders();
    </script>
</body>
</html>
