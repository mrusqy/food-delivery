<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaskeun Food | Delivery Makanan Profesional</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
          theme: {
            extend: {
              colors: {
                primary: '#FFD400',   /* Kuning Grab/Gojek */
                secondary: '#FFFFFF', 
                dark: '#000000',
                accent: '#E53935',    /* Merah CTA */
                support: '#0F6B3C',   /* Hijau Fresh */
              },
              borderRadius: {
                '3xl': '1.5rem',
              }
            }
          }
        }
    </script>

    <link rel="stylesheet" href="css/style.css">

</head>
<body class="bg-gray-50 pb-20">

    <nav class="bg-primary p-4 sticky top-0 z-50 shadow-md">
        <div class="flex justify-between items-center max-w-4xl mx-auto">
            <h1 class="font-bold text-xl italic tracking-tighter">GAS<span class="text-white">KEUN</span></h1>
            <div class="relative cursor-pointer" onclick="window.location.href='cart.html'">
                <i class="fas fa-shopping-cart text-2xl"></i>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-accent text-white text-xs rounded-full px-1.5 py-0.5 border-2 border-primary font-bold">0</span>
            </div>
        </div>
    </nav>

    <section class="p-4 bg-primary rounded-b-3xl mb-6 shadow-sm">
        <div class="max-w-4xl mx-auto">
            <h2 class="text-2xl font-bold mb-3 text-dark">Lapar, Bosque?</h2>
            <div class="relative group">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400">
                    <i class="fas fa-search"></i>
                </span>
                <input type="text" placeholder="Cari ayam geprek, boba, dll..." 
                       class="w-full p-3 pl-10 rounded-xl shadow-inner border-none focus:ring-2 focus:ring-accent transition-all outline-none">
            </div>
        </div>
    </section>

    <main class="max-w-4xl mx-auto p-4">
        <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold text-lg text-dark">Rekomendasi Menu</h3>
            <span class="text-accent text-sm font-semibold cursor-pointer">Lihat Semua</span>
        </div>

        <div id="menu-container" class="grid grid-cols-2 gap-4 md:grid-cols-3 lg:grid-cols-4">
            <div class="animate-pulse bg-white p-4 rounded-2xl h-48 shadow-sm"></div>
            <div class="animate-pulse bg-white p-4 rounded-2xl h-48 shadow-sm"></div>
            <div class="animate-pulse bg-white p-4 rounded-2xl h-48 shadow-sm"></div>
            <div class="animate-pulse bg-white p-4 rounded-2xl h-48 shadow-sm"></div>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 flex justify-around p-3 z-50 md:hidden shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
        <a href="index.html" class="text-primary text-center">
            <i class="fas fa-home block text-xl"></i>
            <span class="text-[10px] font-bold">Home</span>
        </a>
        <a href="orders.html" class="text-gray-400 text-center hover:text-primary transition-colors">
            <i class="fas fa-receipt block text-xl"></i>
            <span class="text-[10px]">Pesanan</span>
        </a>
        <a href="profile.html" class="text-gray-400 text-center hover:text-primary transition-colors">
            <i class="fas fa-user block text-xl"></i>
            <span class="text-[10px]">Profil</span>
        </a>
    </div>

    <script src="js/api.js"></script>
    <script src="js/cart.js"></script>
</body>
</html>
