<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Gaskeun Food</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#FFD400', accent: '#E53935', support: '#0F6B3C' } } }
        }
    </script>
</head>
<body class="bg-gray-100 flex">

    <aside class="w-64 bg-black text-white min-h-screen p-6 hidden md:block">
        <h1 class="text-2xl font-bold mb-10 text-primary italic">ADMIN PAGE</h1>
        <nav class="space-y-4">
            <a href="#" class="block p-3 rounded-xl bg-primary text-black font-bold"><i class="fas fa-home mr-2"></i> Dashboard</a>
            <a href="#" class="block p-3 rounded-xl hover:bg-gray-800"><i class="fas fa-utensils mr-2"></i> Kelola Menu</a>
            <a href="#" class="block p-3 rounded-xl hover:bg-gray-800"><i class="fas fa-shopping-bag mr-2"></i> Pesanan</a>
        </nav>
    </aside>

    <main class="flex-1 p-4 md:p-8">
        <header class="flex justify-between items-center mb-8">
            <h2 class="text-2xl font-bold">Ringkasan Bisnis</h2>
            <button onclick="location.reload()" class="bg-white p-2 rounded-lg shadow-sm"><i class="fas fa-sync"></i></button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-3xl shadow-sm border-l-4 border-primary">
                <p class="text-gray-500 text-sm">Total Pendapatan</p>
                <h3 class="text-2xl font-bold" id="stat-revenue">Rp 0</h3>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm border-l-4 border-support">
                <p class="text-gray-500 text-sm">Pesanan Selesai</p>
                <h3 class="text-2xl font-bold" id="stat-orders">0</h3>
            </div>
            <div class="bg-white p-6 rounded-3xl shadow-sm border-l-4 border-accent">
                <p class="text-gray-500 text-sm">Menu Aktif</p>
                <h3 class="text-2xl font-bold" id="stat-menus">0</h3>
            </div>
        </div>

        <div class="bg-white rounded-3xl shadow-sm overflow-hidden">
            <div class="p-6 border-b flex justify-between items-center">
                <h3 class="font-bold text-lg">Kelola Stok Menu</h3>
                <button class="bg-support text-white px-4 py-2 rounded-xl text-sm">+ Tambah Menu</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-gray-50 text-gray-500 text-sm uppercase">
                        <tr>
                            <th class="p-4">Nama Menu</th>
                            <th class="p-4">Harga</th>
                            <th class="p-4">Status</th>
                            <th class="p-4">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="admin-menu-list">
                        </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="../js/api.js"></script>
    <script>
        // Logika Admin Dashboard
        async function loadAdminData() {
            const res = await fetch(`${API_URL}?action=getAdminStats`);
            const stats = await res.json();
            
            document.getElementById('stat-revenue').innerText = `Rp ${stats.totalRevenue.toLocaleString()}`;
            document.getElementById('stat-orders').innerText = stats.totalOrders;
            document.getElementById('stat-menus').innerText = stats.totalMenus;

            // Load Menu untuk Kelola Stok
            const resMenu = await fetch(`${API_URL}?action=getMenus`);
            const menus = await resMenu.json();
            renderAdminMenus(menus);
        }

        function renderAdminMenus(menus) {
            const container = document.getElementById('admin-menu-list');
            container.innerHTML = menus.map(m => `
                <tr class="border-b hover:bg-gray-50">
                    <td class="p-4 font-medium">${m.name}</td>
                    <td class="p-4">Rp ${parseInt(m.price).toLocaleString()}</td>
                    <td class="p-4">
                        <span class="px-3 py-1 rounded-full text-xs ${m.available === 'yes' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                            ${m.available === 'yes' ? 'Tersedia' : 'Habis'}
                        </span>
                    </td>
                    <td class="p-4">
                        <button class="text-blue-600 hover:underline mr-2">Edit</button>
                        <button class="text-accent hover:underline">Hapus</button>
                    </td>
                </tr>
            `).join('');
        }

        loadAdminData();
    </script>
</body>
</html>
