<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Gaskeun Food</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = {
          theme: { extend: { colors: { primary: '#FFD400', accent: '#E53935', support: '#0F6B3C' } } }
        }
    </script>
</head>
<body class="bg-gray-50 pb-24">

    <header class="p-4 bg-white shadow-sm sticky top-0 z-50 flex items-center">
        <a href="index.html" class="mr-4 text-xl"><i class="fas fa-arrow-left"></i></a>
        <h1 class="font-bold text-lg">Konfirmasi Pesanan</h1>
    </header>

    <main class="max-w-md mx-auto p-4">
        <div class="bg-white p-5 rounded-3xl shadow-sm mb-4 border border-gray-100">
            <h3 class="font-bold mb-3"><i class="fas fa-map-marker-alt text-accent mr-2"></i>Alamat Pengiriman</h3>
            <textarea id="delivery-address" rows="3" class="w-full bg-gray-50 p-3 rounded-2xl border-none focus:ring-2 focus:ring-primary text-sm" placeholder="Contoh: Jl. Merdeka No. 10, Lantai 2, Samping Indomaret"></textarea>
        </div>

        <div class="bg-white p-5 rounded-3xl shadow-sm mb-4 border border-gray-100">
            <h3 class="font-bold mb-3"><i class="fas fa-shopping-bag text-primary mr-2"></i>Item Pesanan</h3>
            <div id="checkout-items" class="space-y-3">
                </div>
        </div>

        <div class="bg-white p-5 rounded-3xl shadow-sm border border-gray-100">
            <h3 class="font-bold mb-3">Rincian Pembayaran</h3>
            <div class="flex justify-between text-sm mb-2 text-gray-600">
                <span>Subtotal</span>
                <span id="subtotal">Rp 0</span>
            </div>
            <div class="flex justify-between text-sm mb-2 text-gray-600">
                <span>Ongkos Kirim</span>
                <span>Rp 10.000</span>
            </div>
            <hr class="my-3 border-dashed">
            <div class="flex justify-between font-bold text-lg">
                <span>Total Bayar</span>
                <span id="total-payment" class="text-accent">Rp 0</span>
            </div>
        </div>
    </main>

    <div class="fixed bottom-0 left-0 right-0 p-4 bg-white border-t border-gray-100 shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
        <button id="btn-place-order" onclick="processOrder()" class="w-full bg-primary hover:bg-[#FFC700] text-black font-bold py-4 rounded-2xl shadow-md transition-all active:scale-95 flex items-center justify-center gap-2">
            <span id="btn-text">Pesan Sekarang</span>
            <div id="btn-loader" class="hidden animate-spin h-5 w-5 border-2 border-black border-t-transparent rounded-full"></div>
        </button>
    </div>

    <script src="js/api.js"></script>
    <script>
        // Ambil data dari localStorage yang dibuat oleh cart.js
        let cart = JSON.parse(localStorage.getItem('gaskeun_cart')) || [];
        const deliveryFee = 10000;

        function renderCheckout() {
            const container = document.getElementById('checkout-items');
            let subtotal = 0;

            if (cart.length === 0) {
                window.location.href = 'index.html';
                return;
            }

            container.innerHTML = cart.map(item => {
                subtotal += item.price * item.qty;
                return `
                    <div class="flex justify-between text-sm">
                        <span><span class="font-bold text-gray-400">${item.qty}x</span> ${item.name}</span>
                        <span>Rp ${(item.price * item.qty).toLocaleString()}</span>
                    </div>
                `;
            }).join('');

            document.getElementById('subtotal').innerText = `Rp ${subtotal.toLocaleString()}`;
            document.getElementById('total-payment').innerText = `Rp ${(subtotal + deliveryFee).toLocaleString()}`;
        }

        async function processOrder() {
            const address = document.getElementById('delivery-address').value;
            const btnText = document.getElementById('btn-text');
            const btnLoader = document.getElementById('btn-loader');
            const btn = document.getElementById('btn-place-order');

            if (!address) {
                alert('Tolong isi alamat pengiriman dulu ya, Bosque!');
                return;
            }

            // Animasi Loading
            btn.disabled = true;
            btnText.innerText = "Memproses...";
            btnLoader.classList.remove('hidden');

            const totalAmount = cart.reduce((sum, item) => sum + (item.price * item.qty), 0) + deliveryFee;

            const orderData = {
                action: 'createOrder',
                uid: 'CUST-GUEST', // Sementara guest, nanti bisa dari auth
                items: cart,
                total: totalAmount,
                address: address
            };

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(orderData)
                });
                
                const result = await response.json();
                
                if (result.status === 'success') {
                    localStorage.removeItem('gaskeun_cart'); // Kosongkan keranjang
                    alert('Pesanan Berhasil! Mohon tunggu konfirmasi admin.');
                    window.location.href = 'orders.html'; // Pindah ke halaman tracking
                }
            } catch (error) {
                alert('Aduh, ada gangguan koneksi. Coba lagi ya!');
                console.error(error);
            } finally {
                btn.disabled = false;
                btnText.innerText = "Pesan Sekarang";
                btnLoader.classList.add('hidden');
            }
        }

        renderCheckout();
    </script>
</body>
</html>
